<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Product Designer - Cluster Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .designer-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            min-height: calc(100vh - 200px);
        }

        .designer-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .preview-panel {
            background-color: var(--bg-light);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .product-preview {
            position: relative;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1;
            background: rgb(99, 24, 24);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .preview-image {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .preview-canvas {
            width: 100%;
            height: 100%;
        }

        .product-side-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .side-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .side-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .designer-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .design-option {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .option-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .option-title i {
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 46, 60, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .color-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        .color-option {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            transition: var(--transition);
            background-color: var(--bg-light);
        }

        .color-option:hover {
            transform: scale(1.05);
        }

        .color-option.selected {
            border-color: var(--primary-color);
            font-weight: 600;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.5rem;
            background: var(--bg-light);
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .file-upload-label:hover {
            border-color: var(--primary-color);
            background-color: rgba(139, 46, 60, 0.05);
        }

        .file-upload-label i {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .size-color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .size-options,
        .color-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .size-btn,
        .color-btn {
            padding: 0.7rem 1.2rem;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .size-btn:hover,
        .color-btn:hover {
            border-color: var(--primary-color);
        }

        .size-btn.selected,
        .color-btn.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .price-display {
            background-color: #FFF8F0;
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
        }

        .price-label {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .price-amount {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .action-buttons .btn {
            margin: 0;
            width: 100%;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .qty-btn:hover {
            background-color: var(--bg-light);
        }

        .qty-input {
            width: 60px;
            text-align: center;
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-weight: 600;
        }

        .text-customization-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .text-option {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .slider-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .slider-group input[type="range"] {
            flex: 1;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: var(--primary-color);
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .designer-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        @media (max-width: 768px) {
            .designer-container {
                padding: 1rem;
            }

            .size-color-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .designer-section {
                order: 2;
            }

            .preview-panel {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
                     <div class="nav-logo">
    <a href="index.html" class="logo-brand-link">
        <img src="logo.png" alt="Your Brand Logo" class="brand-logo">
        <div class="brand-name">
            <div class="brand-main">CLUSTER</div>
            <div class="brand-sub">STUDIO</div>
        </div>
    </a>
</div>
            
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#categories" class="nav-link">Shop</a>
                <a href="custom-product.html" class="nav-link active">Customize</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
            </div>
            
            <div class="nav-icons">
                <a href="#" class="nav-icon"><i class="fas fa-heart"></i><span class="badge wishlist-count">0</span></a>
                <a href="cart.html" class="nav-icon"><i class="fas fa-shopping-bag"></i><span class="badge cart-count">0</span></a>
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Designer Container -->
    <div class="designer-container">
        <!-- Preview Panel -->
        <div class="preview-panel">
            <h3 style="margin-bottom: 1rem; text-align: center;">Product Preview</h3>
            <div class="product-side-selector">
                <button class="side-btn active" onclick="switchSide('front')">Front</button>
                <button class="side-btn" onclick="switchSide('back')">Back</button>
            </div>
            <div class="product-preview">
                <canvas id="productCanvas" class="preview-canvas"></canvas>
            </div>
        </div>

        <!-- Designer Panel -->
        <div class="designer-panel">
            <!-- Product Selection -->
            <div class="design-option">
                <div class="option-title">
                    <i class="fas fa-box"></i> Select Product
                </div>
                <div class="form-group">
                    <label for="productType">Product Type</label>
                    <select id="productType" onchange="changeProduct()">
                        <option value="tshirt">T-Shirt</option>
                        <option value="mug">Mug</option>
                        <option value="hoodie">Hoodie</option>
                        <option value="cushion">Cushion</option>
                        <option value="phonecase">Phone Case</option>
                        <option value="bottle">Water Bottle</option>
                    </select>
                </div>
            </div>

            <!-- Color Selection -->
            <div class="design-option">
                <div class="option-title">
                    <i class="fas fa-palette"></i> Product Color
                </div>
                <div class="color-picker-grid">
                    <div class="color-option selected" onclick="selectColor('black')" style="background-color: #1A1A1A; color: white;">Black</div>
                    <div class="color-option" onclick="selectColor('white')" style="background-color: #FFFFFF; color: #1A1A1A; border: 1px solid var(--border-color);">White</div>
                    <div class="color-option" onclick="selectColor('red')" style="background-color: #E74C3C; color: white;">Red</div>
                    <div class="color-option" onclick="selectColor('blue')" style="background-color: #3498DB; color: white;">Blue</div>
                    <div class="color-option" onclick="selectColor('gray')" style="background-color: #95A5A6; color: white;">Gray</div>
                    <div class="color-option" onclick="selectColor('navy')" style="background-color: #1A3A52; color: white;">Navy</div>
                    <div class="color-option" onclick="selectColor('green')" style="background-color: #27AE60; color: white;">Green</div>
                    <div class="color-option" onclick="selectColor('purple')" style="background-color: #8E44AD; color: white;">Purple</div>
                </div>
            </div>

            <!-- Image Upload -->
            <div class="design-option">
                <div class="option-title">
                    <i class="fas fa-image"></i> Upload Image
                </div>
                <div class="file-upload">
                    <input type="file" id="imageUpload" accept="image/*" onchange="uploadImage(event)">
                    <label for="imageUpload" class="file-upload-label">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <div>
                            <div style="font-weight: 600;">Click to upload or drag image</div>
                            <div style="font-size: 0.85rem; color: var(--text-light);">PNG, JPG up to 5MB</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Text Customization -->
            <div class="design-option">
                <div class="option-title">
                    <i class="fas fa-text-width"></i> Add Text
                </div>
                <div class="text-customization-options">
                    <div class="form-group">
                        <label for="customText">Custom Text</label>
                        <textarea id="customText" placeholder="Enter your text here..." oninput="updatePreview()"></textarea>
                    </div>
                    
                    <div class="text-option">
                        <label for="textFont">Font</label>
                        <select id="textFont" onchange="updatePreview()">
                            <option value="Arial">Arial</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Verdana">Verdana</option>
                        </select>
                    </div>

                    <div class="text-option">
                        <label for="textColor">Text Color</label>
                        <input type="color" id="textColor" value="#FFFFFF" onchange="updatePreview()">
                    </div>

                    <div class="text-option">
                        <label>Font Size</label>
                        <div class="slider-group">
                            <input type="range" id="fontSize" min="10" max="60" value="24" oninput="updatePreview()">
                            <span class="slider-value" id="fontSizeValue">24px</span>
                        </div>
                    </div>

                    <div class="text-option">
                        <label for="textPosition">Text Position</label>
                        <select id="textPosition" onchange="updatePreview()">
                            <option value="top">Top</option>
                            <option value="center" selected>Center</option>
                            <option value="bottom">Bottom</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Size & Quantity -->
            <div class="design-option">
                <div class="option-title">
                    <i class="fas fa-ruler"></i> Size & Quantity
                </div>
                <div class="size-color-grid">
                    <div>
                        <label style="display: block; margin-bottom: 0.7rem; font-weight: 600;">Size</label>
                        <div class="size-options">
                            <button class="size-btn selected" onclick="selectSize('S')">S</button>
                            <button class="size-btn" onclick="selectSize('M')">M</button>
                            <button class="size-btn" onclick="selectSize('L')">L</button>
                            <button class="size-btn" onclick="selectSize('XL')">XL</button>
                        </div>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.7rem; font-weight: 600;">Quantity</label>
                        <div class="quantity-selector">
                            <button class="qty-btn" onclick="decreaseQty()">−</button>
                            <input type="number" id="quantity" value="1" min="1" max="100" class="qty-input">
                            <button class="qty-btn" onclick="increaseQty()">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Price Display -->
            <div class="price-display">
                <div class="price-label">Total Price</div>
                <div class="price-amount">₹<span id="totalPrice">999</span></div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="resetDesign()">
                    <i class="fas fa-redo"></i> Reset
                </button>
                <button class="btn btn-primary" onclick="addToCart()">
                    <i class="fas fa-shopping-bag"></i> Add to Cart
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
    <script>
        // ==================== CUSTOM DESIGNER LOGIC ====================
        let currentSide = 'front';
        let currentColor = 'black';
        let currentSize = 'S';
        let uploadedImage = null;
        let basePrice = 999;

        const products = {
            tshirt: { name: 'Custom T-Shirt', basePrice: 499, sizes: ['S', 'M', 'L', 'XL'] },
            mug: { name: 'Custom Mug', basePrice: 299, sizes: ['Normal'] },
            hoodie: { name: 'Custom Hoodie', basePrice: 799, sizes: ['S', 'M', 'L', 'XL', 'XXL'] },
            cushion: { name: 'Custom Cushion', basePrice: 599, sizes: ['16x16', '18x18', '20x20'] },
            phonecase: { name: 'Custom Phone Case', basePrice: 399, sizes: ['iPhone 12', 'iPhone 13', 'iPhone 14', 'Samsung A12'] },
            bottle: { name: 'Custom Water Bottle', basePrice: 399, sizes: ['500ml', '750ml', '1L'] },
        };

        const colorCodes = {
            black: '#1A1A1A',
            white: '#FFFFFF',
            red: '#E74C3C',
            blue: '#3498DB',
            gray: '#95A5A6',
            navy: '#1A3A52',
            green: '#27AE60',
            purple: '#8E44AD',
        };

        function changeProduct() {
            const productType = document.getElementById('productType').value;
            const product = products[productType];
            basePrice = product.basePrice;
            updatePreview();
            updatePrice();
        }

        function selectColor(color) {
            currentColor = color;
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            updatePreview();
        }

        function selectSize(size) {
            currentSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            updatePrice();
        }

        function uploadImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImage = new Image();
                    uploadedImage.onload = updatePreview;
                    uploadedImage.src = e.target.result;
                };
                reader.readAsDataURL(file);
                showToast('Image uploaded successfully!', 'success');
            }
        }

        function switchSide(side) {
            currentSide = side;
            document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updatePreview();
        }

        function updatePreview() {
            const canvas = document.getElementById('productCanvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = 350;
            canvas.height = 350;

            // Draw background (product color)
            ctx.fillStyle = colorCodes[currentColor];
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw border
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);

            // Draw uploaded image if exists
            if (uploadedImage) {
                const maxWidth = canvas.width * 0.8;
                const maxHeight = canvas.height * 0.6;
                let imgWidth = uploadedImage.width;
                let imgHeight = uploadedImage.height;

                if (imgWidth > maxWidth || imgHeight > maxHeight) {
                    const ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);
                    imgWidth *= ratio;
                    imgHeight *= ratio;
                }

                const x = (canvas.width - imgWidth) / 2;
                const y = (canvas.height - imgHeight) / 3;
                ctx.drawImage(uploadedImage, x, y, imgWidth, imgHeight);
            }

            // Draw custom text
            const customText = document.getElementById('customText').value;
            if (customText) {
                const fontSize = parseInt(document.getElementById('fontSize').value);
                const font = document.getElementById('textFont').value;
                const textColor = document.getElementById('textColor').value;
                const textPosition = document.getElementById('textPosition').value;

                ctx.font = `${fontSize}px ${font}`;
                ctx.fillStyle = textColor;
                ctx.textAlign = 'center';

                const lines = customText.split('\n');
                let yPos = canvas.height * 0.7;

                if (textPosition === 'top') yPos = fontSize + 20;
                if (textPosition === 'bottom') yPos = canvas.height - 20;

                lines.forEach((line, index) => {
                    ctx.fillText(line, canvas.width / 2, yPos + (index * fontSize * 1.2));
                });
            }
        }

        function updatePrice() {
            const quantity = parseInt(document.getElementById('quantity').value) || 1;
            const total = basePrice * quantity;
            document.getElementById('totalPrice').textContent = total;
        }

        function increaseQty() {
            const qty = document.getElementById('quantity');
            qty.value = Math.min(100, parseInt(qty.value) + 1);
            updatePrice();
        }

        function decreaseQty() {
            const qty = document.getElementById('quantity');
            qty.value = Math.max(1, parseInt(qty.value) - 1);
            updatePrice();
        }

        function resetDesign() {
            document.getElementById('customText').value = '';
            document.getElementById('imageUpload').value = '';
            document.getElementById('quantity').value = '1';
            uploadedImage = null;
            updatePreview();
            updatePrice();
            showToast('Design reset', 'success');
        }

        function addToCart() {
            const productType = document.getElementById('productType').value;
            const product = products[productType];
            const quantity = parseInt(document.getElementById('quantity').value);
            const customText = document.getElementById('customText').value;
            
            const customProduct = {
                id: Date.now(),
                name: product.name,
                type: 'custom',
                price: basePrice,
                color: currentColor,
                size: currentSize,
                quantity: quantity,
                customization: {
                    text: customText,
                    image: uploadedImage ? uploadedImage.src : null,
                    textFont: document.getElementById('textFont').value,
                    textColor: document.getElementById('textColor').value,
                    fontSize: document.getElementById('fontSize').value,
                    textPosition: document.getElementById('textPosition').value,
                    productColor: currentColor,
                    side: currentSide,
                },
            };

            CustomOrderManager.addCustomToCart(customProduct);
            setTimeout(() => {
                window.location.href = 'cart.html';
            }, 1500);
        }

        // Update font size display
        document.getElementById('fontSize').addEventListener('input', function() {
            document.getElementById('fontSizeValue').textContent = this.value + 'px';
        });

        // Initialize
        updatePreview();
        updatePrice();
    </script>
</body>
</html>
