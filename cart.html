<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Cluster Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            min-height: calc(100vh - 300px);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-empty {
            text-align: center;
            padding: 3rem;
            background-color: var(--bg-light);
            border-radius: 12px;
        }

        .cart-empty i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .cart-empty h2 {
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .cart-empty p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .cart-item {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 1.5rem;
            align-items: start;
            transition: var(--transition);
        }

        .cart-item:hover {
            box-shadow: var(--shadow-md);
        }

        .cart-item-image {
            width: 120px;
            height: 120px;
            background-color: var(--bg-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary-color);
        }

        .cart-item-details h3 {
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .cart-item-details p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .item-attributes {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .attribute {
            background-color: #F0F0F0;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-dark);
        }

        .attribute-label {
            font-weight: 600;
            color: var(--primary-color);
        }

        .cart-item-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }

        .price-section {
            text-align: right;
        }

        .item-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .original-price {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem;
        }

        .qty-btn-sm {
            width: 30px;
            height: 30px;
            border: none;
            background: white;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: var(--transition);
        }

        .qty-btn-sm:hover {
            background-color: var(--bg-light);
        }

        .qty-display {
            width: 40px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            color: var(--error-color);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .remove-btn:hover {
            color: var(--primary-dark);
            transform: scale(1.1);
        }

        .cart-summary {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .summary-row.total {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .summary-label {
            color: var(--text-light);
        }

        .summary-value {
            font-weight: 600;
            color: var(--text-dark);
        }

        .coupon-section {
            margin-bottom: 2rem;
        }

        .coupon-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .coupon-input input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
        }

        .coupon-input button {
            padding: 0.8rem 1.2rem;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .coupon-input button:hover {
            background-color: var(--border-color);
        }

        .checkout-btn {
            width: 100%;
            margin-top: 1.5rem;
        }

        .continue-shopping {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--primary-color);
            text-decoration: underline;
            cursor: pointer;
        }

        .custom-preview {
            background-color: var(--bg-light);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            text-align: center;
        }

        .custom-preview-title {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .custom-preview-canvas {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-item {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .cart-item-image {
                width: 100%;
                height: 150px;
            }

            .cart-item-actions {
                align-items: flex-start;
            }

            .cart-summary {
                position: static;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
                   <div class="nav-logo">
    <a href="index.html" class="logo-brand-link">
        <img src="logo.png" alt="Your Brand Logo" class="brand-logo">
        <div class="brand-name">
            <div class="brand-main">CLUSTER</div>
            <div class="brand-sub">STUDIO</div>
        </div>
    </a>
</div>
            
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#categories" class="nav-link">Shop</a>
                <a href="custom-product.html" class="nav-link">Customize</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
            </div>
            
            <div class="nav-icons">
                <a href="#" class="nav-icon"><i class="fas fa-heart"></i><span class="badge wishlist-count">0</span></a>
                <a href="cart.html" class="nav-icon"><i class="fas fa-shopping-bag"></i><span class="badge cart-count">0</span></a>
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Cart Container -->
    <div class="cart-container">
        <!-- Cart Items -->
        <div>
            <h1 style="margin-bottom: 2rem; font-family: 'Cormorant Garamond', serif;">Shopping Cart</h1>
            <div id="cartItems" class="cart-items">
                <!-- Items will be loaded here -->
            </div>
        </div>

        <!-- Order Summary -->
        <div class="cart-summary">
            <h2 class="summary-title">Order Summary</h2>
            
            <div class="coupon-section">
                <div class="coupon-input">
                    <input type="text" id="couponCode" placeholder="Enter coupon code">
                    <button onclick="applyCoupon()"><i class="fas fa-ticket-alt"></i></button>
                </div>
            </div>

            <div class="summary-row">
                <span class="summary-label">Subtotal</span>
                <span class="summary-value">₹<span id="subtotal">0</span></span>
            </div>

            <div class="summary-row">
                <span class="summary-label">Shipping</span>
                <span class="summary-value">₹<span id="shipping">100</span></span>
            </div>

            <div class="summary-row">
                <span class="summary-label">Tax (18%)</span>
                <span class="summary-value">₹<span id="tax">0</span></span>
            </div>

            <div class="summary-row">
                <span class="summary-label">Discount</span>
                <span class="summary-value" style="color: var(--success-color);">-₹<span id="discount">0</span></span>
            </div>

            <div class="summary-row total">
                <span>Total</span>
                <span>₹<span id="total">0</span></span>
            </div>

            <button class="btn btn-primary checkout-btn" onclick="proceedToCheckout()">
                <i class="fas fa-lock"></i> Proceed to Checkout
            </button>

            <a href="index.html" class="continue-shopping">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
    <script>
        // ==================== CART PAGE LOGIC ====================
        let cartData = [];
        let appliedDiscount = 0;
        const TAX_RATE = 0.18;
        const SHIPPING_COST = 100;

        function loadCart() {
            cartData = StorageManager.getCart();
            renderCart();
            calculateTotal();
        }

        function renderCart() {
            const cartContainer = document.getElementById('cartItems');
            
            if (cartData.length === 0) {
                cartContainer.innerHTML = `
                    <div class="cart-empty">
                        <i class="fas fa-shopping-bag"></i>
                        <h2>Your Cart is Empty</h2>
                        <p>Explore our products and add something special!</p>
                        <a href="index.html" class="btn btn-primary">Continue Shopping</a>
                    </div>
                `;
                document.querySelector('.cart-summary').style.display = 'none';
                return;
            }

            document.querySelector('.cart-summary').style.display = 'block';
            
            cartContainer.innerHTML = cartData.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-image">
                        <i class="fas fa-box"></i>
                    </div>
                    <div class="cart-item-details">
                        <h3>${item.name}</h3>
                        <p>${item.type === 'custom' ? 'Custom Product' : 'Regular Product'}</p>
                        
                        <div class="item-attributes">
                            ${item.color ? `<div class="attribute"><span class="attribute-label">Color:</span> ${item.color}</div>` : ''}
                            ${item.size ? `<div class="attribute"><span class="attribute-label">Size:</span> ${item.size}</div>` : ''}
                        </div>

                        ${item.type === 'custom' && item.customization ? `
                            <div class="custom-preview">
                                <div class="custom-preview-title">Custom Design Preview</div>
                                ${item.customization.text ? `<p style="font-size: 0.85rem; color: var(--text-dark);">Text: "${item.customization.text.substring(0, 50)}${item.customization.text.length > 50 ? '...' : ''}"</p>` : ''}
                            </div>
                        ` : ''}
                    </div>
                    <div class="cart-item-actions">
                        <div class="price-section">
                            <div class="item-price">₹${item.price * item.quantity}</div>
                            <div class="original-price">₹${item.price} each</div>
                        </div>
                        <div class="quantity-control">
                            <button class="qty-btn-sm" onclick="updateQuantity(${index}, ${item.quantity - 1})">−</button>
                            <div class="qty-display">${item.quantity}</div>
                            <button class="qty-btn-sm" onclick="updateQuantity(${index}, ${item.quantity + 1})">+</button>
                        </div>
                        <div class="remove-btn" onclick="removeItem(${index})">
                            <i class="fas fa-trash"></i> Remove
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQuantity(index, newQuantity) {
            if (newQuantity < 1) {
                removeItem(index);
                return;
            }
            cartData[index].quantity = newQuantity;
            StorageManager.setCart(cartData);
            renderCart();
            calculateTotal();
            updateCartCount();
        }

        function removeItem(index) {
            cartData.splice(index, 1);
            StorageManager.setCart(cartData);
            renderCart();
            calculateTotal();
            updateCartCount();
            showToast('Item removed from cart', 'success');
        }

        function calculateTotal() {
            const subtotal = cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = Math.round(subtotal * TAX_RATE);
            const discount = appliedDiscount;
            const total = subtotal + SHIPPING_COST + tax - discount;

            document.getElementById('subtotal').textContent = subtotal;
            document.getElementById('tax').textContent = tax;
            document.getElementById('discount').textContent = discount;
            document.getElementById('total').textContent = total;
        }

        function applyCoupon() {
            const couponCode = document.getElementById('couponCode').value.toUpperCase();
            
            // Sample coupon codes
            const coupons = {
                'SAVE10': 10,
                'WELCOME20': 20,
                'CLUSTER15': 15,
                'CUSTOM25': 25,
            };

            if (coupons[couponCode]) {
                appliedDiscount = coupons[couponCode];
                calculateTotal();
                showToast(`Coupon "${couponCode}" applied! You saved ₹${appliedDiscount}`, 'success');
            } else {
                showToast('Invalid coupon code', 'error');
            }
        }

        function proceedToCheckout() {
            if (cartData.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }
            window.location.href = 'checkout.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            updateCartCount();
            updateWishlistCount();
        });
    </script>
</body>
</html>
