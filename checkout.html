<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Cluster Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .checkout-wrapper {
            background-color: var(--bg-light);
            min-height: calc(100vh - 100px);
            padding: 3rem 2rem;
        }

        .checkout-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .checkout-header {
            margin-bottom: 3rem;
        }

        .checkout-header h1 {
            margin-bottom: 0.5rem;
        }

        .progress-steps {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--border-color);
            z-index: -1;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .step-number {
            width: 40px;
            height: 40px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin: 0 auto 0.5rem;
            position: relative;
            z-index: 1;
        }

        .step.completed .step-number {
            background-color: var(--success-color);
        }

        .step.inactive .step-number {
            background-color: var(--text-muted);
        }

        .step-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .step.inactive .step-label {
            color: var(--text-muted);
        }

        .checkout-content {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }

        .form-section {
            margin-bottom: 2.5rem;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .section-title i {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 46, 60, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group.required label::after {
            content: ' *';
            color: var(--error-color);
        }

        .order-summary {
            background-color: var(--bg-light);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .order-summary-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.7rem;
            padding-bottom: 0.7rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .summary-item.total {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 0.7rem;
            padding-top: 0.7rem;
            border-top: 2px solid var(--text-muted);
            border-bottom: none;
        }

        .terms-agreement {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            padding: 1rem;
            background-color: #FFF8F0;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .terms-agreement input[type="checkbox"] {
            margin-top: 0.2rem;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .terms-agreement label {
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .terms-agreement a {
            color: var(--primary-color);
            font-weight: 600;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .button-group .btn {
            margin: 0;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .back-button {
            background-color: var(--bg-light);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }

        .back-button:hover {
            background-color: var(--border-color);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-message {
            background-color: #FADBD8;
            color: var(--error-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background-color: #D5F4E6;
            color: var(--success-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .progress-steps {
                gap: 1rem;
            }

            .checkout-content {
                padding: 1.5rem;
            }

            .checkout-wrapper {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
                    <div class="nav-logo">
    <a href="index.html" class="logo-brand-link">
        <img src="logo.png" alt="Your Brand Logo" class="brand-logo">
        <div class="brand-name">
            <div class="brand-main">CLUSTER</div>
            <div class="brand-sub">STUDIO</div>
        </div>
    </a>
</div>
            
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#categories" class="nav-link">Shop</a>
                <a href="custom-product.html" class="nav-link">Customize</a>
            </div>
            
            <div class="nav-icons">
                <a href="cart.html" class="nav-icon"><i class="fas fa-shopping-bag"></i><span class="badge cart-count">0</span></a>
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Checkout Wrapper -->
    <div class="checkout-wrapper">
        <div class="checkout-container">
            <!-- Header -->
            <div class="checkout-header">
                <h1>Complete Your Order</h1>
                <div class="progress-steps">
                    <div class="step completed">
                        <div class="step-number"><i class="fas fa-check"></i></div>
                        <div class="step-label">Cart Review</div>
                    </div>
                    <div class="step active">
                        <div class="step-number">2</div>
                        <div class="step-label">Shipping Details</div>
                    </div>
                    <div class="step inactive">
                        <div class="step-number">3</div>
                        <div class="step-label">Place Order</div>
                    </div>
                </div>
            </div>

            <!-- Checkout Content -->
            <div class="checkout-content">
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i> Order submitted successfully!
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Processing your order...</p>
                </div>

                <form id="checkoutForm">
                    <!-- Order Summary -->
                    <div class="order-summary">
                        <div class="order-summary-title">
                            <i class="fas fa-shopping-bag"></i> Order Summary
                        </div>
                        <div id="orderItems"></div>
                        <div class="summary-item total">
                            <span>Total Amount</span>
                            <span>₹<span id="orderTotal">0</span></span>
                        </div>
                    </div>

                    <!-- Customer Information -->
                    <div class="form-section">
                        <h2 class="section-title">
                            <i class="fas fa-user"></i> Personal Information
                        </h2>
                        <div class="form-grid">
                            <div class="form-group required">
                                <label for="customerName">Full Name</label>
                                <input type="text" id="customerName" name="customerName" required placeholder="Enter your full name">
                            </div>
                            <div class="form-group required">
                                <label for="customerPhone">Phone Number</label>
                                <input type="tel" id="customerPhone" name="customerPhone" required placeholder="10-digit number" pattern="[0-9]{10}">
                            </div>
                            <div class="form-group full">
                                <label for="customerEmail">Email Address (Optional)</label>
                                <input type="email" id="customerEmail" name="customerEmail" placeholder="your@email.com">
                            </div>
                        </div>
                    </div>

                    <!-- Shipping Address -->
                    <div class="form-section">
                        <h2 class="section-title">
                            <i class="fas fa-map-marker-alt"></i> Delivery Address
                        </h2>
                        <div class="form-grid full">
                            <div class="form-group required">
                                <label for="street">Street Address</label>
                                <input type="text" id="street" name="street" required placeholder="House number and street name">
                            </div>
                            <div class="form-grid">
                                <div class="form-group required">
                                    <label for="city">City</label>
                                    <input type="text" id="city" name="city" required placeholder="City">
                                </div>
                                <div class="form-group required">
                                    <label for="state">State</label>
                                    <input type="text" id="state" name="state" required placeholder="State">
                                </div>
                            </div>
                            <div class="form-grid">
                                <div class="form-group required">
                                    <label for="zip">Zip Code</label>
                                    <input type="text" id="zip" name="zip" required placeholder="Postal code">
                                </div>
                                <div class="form-group required">
                                    <label for="country">Country</label>
                                    <select id="country" name="country" required>
                                        <option value="">Select Country</option>
                                        <option value="India">India</option>
                                        <option value="USA">USA</option>
                                        <option value="UK">UK</option>
                                        <option value="Canada">Canada</option>
                                        <option value="Australia">Australia</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group full">
                                <label for="additionalInfo">Additional Instructions (Optional)</label>
                                <textarea id="additionalInfo" name="additionalInfo" placeholder="Any special delivery instructions..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Terms Agreement -->
                    <div class="form-section">
                        <div class="terms-agreement">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">
                                I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>. 
                                I understand that my order will be processed and I will receive it within 5-7 business days.
                            </label>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button type="button" class="btn back-button" onclick="goBack()">
                            <i class="fas fa-arrow-left"></i> Back to Cart
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-check"></i> Place Order
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
    <script>
        // ==================== CHECKOUT PAGE LOGIC ====================
        let cartData = [];
        let orderTotal = 0;
        const TAX_RATE = 0.18;
        const SHIPPING_COST = 100;

        function loadCheckout() {
            cartData = StorageManager.getCart();
            if (cartData.length === 0) {
                window.location.href = 'cart.html';
                return;
            }
            renderOrderSummary();
            attachFormListener();
        }

        function renderOrderSummary() {
            const container = document.getElementById('orderItems');
            const subtotal = cartData.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = Math.round(subtotal * TAX_RATE);
            orderTotal = subtotal + SHIPPING_COST + tax;

            let itemsHtml = cartData.map(item => `
                <div class="summary-item">
                    <span>${item.name} x${item.quantity}</span>
                    <span>₹${item.price * item.quantity}</span>
                </div>
            `).join('');

            itemsHtml += `
                <div class="summary-item">
                    <span>Subtotal</span>
                    <span>₹${subtotal}</span>
                </div>
                <div class="summary-item">
                    <span>Shipping</span>
                    <span>₹${SHIPPING_COST}</span>
                </div>
                <div class="summary-item">
                    <span>Tax (18%)</span>
                    <span>₹${tax}</span>
                </div>
            `;

            container.innerHTML = itemsHtml;
            document.getElementById('orderTotal').textContent = orderTotal;
        }

        function attachFormListener() {
            const form = document.getElementById('checkoutForm');
            form.addEventListener('submit', handleCheckout);
        }

        function handleCheckout(e) {
            e.preventDefault();
            
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.classList.remove('show');

            // Validate form
            if (!validateForm()) {
                errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill all required fields correctly';
                errorMsg.classList.add('show');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('checkoutForm').style.display = 'none';

            // Collect form data
            const orderData = {
                customerName: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                email: document.getElementById('customerEmail').value || 'N/A',
                address: `${document.getElementById('street').value}, ${document.getElementById('city').value}, ${document.getElementById('state').value}, ${document.getElementById('zip').value}, ${document.getElementById('country').value}`,
                items: cartData,
                total: orderTotal,
                timestamp: new Date().toLocaleDateString('en-IN'),
            };

            // Simulate processing delay
            setTimeout(() => {
                submitToWhatsApp(orderData);
            }, 1500);
        }

        function submitToWhatsApp(orderData) {
            const whatsappPhone = '918380808435'; // WhatsApp number without + or spaces

            // Format message
            let message = '*Cluster Studio - New Order*\n\n';
            message += `*Customer Details*\n`;
            message += `Name: ${orderData.customerName}\n`;
            message += `Phone: ${orderData.phone}\n`;
            message += `Email: ${orderData.email}\n`;
            message += `Address: ${orderData.address}\n\n`;
            
            message += `*Order Items*\n`;
            orderData.items.forEach((item, i) => {
                message += `${i + 1}. ${item.name}\n`;
                message += `   Quantity: ${item.quantity}\n`;
                message += `   Price: ₹${item.price * item.quantity}\n`;
                if (item.color) message += `   Color: ${item.color}\n`;
                if (item.size) message += `   Size: ${item.size}\n`;
                if (item.type === 'custom') message += `   Type: Custom Product\n`;
                message += '\n';
            });

            message += `*Order Total: ₹${orderData.total}*\n`;
            message += `*Date: ${orderData.timestamp}*\n\n`;
            message += `Thank you for your order!`;

            // Open WhatsApp
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${whatsappPhone}?text=${encodedMessage}`;
            
            // Store order in localStorage before redirecting
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push({
                id: Date.now(),
                ...orderData,
            });
            localStorage.setItem('orders', JSON.stringify(orders));

            // Clear cart
            StorageManager.clearCart();
            updateCartCount();

            // Show success message
            document.getElementById('loading').classList.remove('active');
            document.getElementById('successMessage').classList.add('show');

            // Redirect to WhatsApp
            setTimeout(() => {
                window.open(whatsappUrl, '_blank');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }, 2000);
        }

        function validateForm() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const street = document.getElementById('street').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const zip = document.getElementById('zip').value.trim();
            const country = document.getElementById('country').value;
            const terms = document.getElementById('terms').checked;

            const phoneRegex = /^[0-9]{10}$/;

            if (!name || !phone || !street || !city || !state || !zip || !country || !terms) {
                return false;
            }

            if (!phoneRegex.test(phone)) {
                return false;
            }

            return true;
        }

        function goBack() {
            window.history.back();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCheckout();
            updateCartCount();
        });
    </script>
</body>
</html>
